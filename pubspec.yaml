name: charity_donation_tracker
description: "A charity donation tracker app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3
  path: ^1.9.0
  intl: ^0.19.0
  provider: ^6.1.2
  fl_chart: ^0.68.0
  share_plus: ^9.0.0
  path_provider: ^2.1.3
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1



flutter:
  uses-material-design: true
  assets:
    - assets/icons/charity_logo.png
    - assets/icons/charity_logo_foreground.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/charity_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "assets/icons/charity_logo_foreground.png"
  web:
    generate: false